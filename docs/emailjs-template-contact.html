<!--
  EmailJS — paste into template Content (HTML mode)

  Sidebar:
  - To Email:    {{to_email}}
  - From Name:   {{from_name}}
  - From Email:  ✓ Use Default Email Address
  - Reply To:    {{reply_to}}
  - Subject:     {{subject}}

  Variables: to_email, from_name, user_name, user_email, user_subject,
  user_message, subject, message, reply_to

  Hostinger webmail and nearly all modern clients render HTML email. SMTP only
  transports the message; rendering is done by the inbox app (same as Gmail).
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquiry</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f6f8;padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06);">
          <tr>
            <td style="height:4px;background-color:#2c5aa0;line-height:4px;font-size:0;">&nbsp;</td>
          </tr>
          <tr>
            <td style="padding:28px 28px 8px 28px;">
              <p style="margin:0;font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#2c5aa0;">Website inquiry</p>
              <p style="margin:8px 0 0 0;font-size:15px;line-height:1.5;color:#4a5568;">Someone submitted the contact form on <strong style="color:#1a202c;">metalloscrap.com</strong>.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 28px 28px 28px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #edf2f7;">
                    <span style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#718096;margin-bottom:4px;">Name</span>
                    <span style="font-size:16px;color:#1a202c;line-height:1.4;">{{user_name}}</span>
                  </td>
                </tr>
                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #edf2f7;">
                    <span style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#718096;margin-bottom:4px;">Email</span>
                    <a href="mailto:{{user_email}}" style="font-size:16px;color:#2c5aa0;text-decoration:none;">{{user_email}}</a>
                  </td>
                </tr>
                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #edf2f7;">
                    <span style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#718096;margin-bottom:4px;">Topic</span>
                    <span style="font-size:16px;color:#1a202c;line-height:1.4;">{{user_subject}}</span>
                  </td>
                </tr>
                <tr>
                  <td style="padding:16px 0 0 0;">
                    <span style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#718096;margin-bottom:8px;">Message</span>
                    <div style="font-size:15px;line-height:1.65;color:#2d3748;background:#f7fafc;border-radius:8px;padding:16px;border:1px solid #e2e8f0;white-space:pre-wrap;">{{user_message}}</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:0 28px 24px 28px;">
              <p style="margin:0;font-size:12px;line-height:1.5;color:#a0aec0;">Reply to this email to respond directly to the sender.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px;background:#fafafa;border-top:1px solid #edf2f7;">
              <p style="margin:0;font-size:11px;color:#a0aec0;text-align:center;">Shreela Group · metalloscrap.com</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
